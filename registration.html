<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/><meta content="width=device-width,initial-scale=1,maximum-scale=1" name="viewport"/><title>Registration — Smart DT Project</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/><link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/><link href="css/smartdt.css" rel="stylesheet"/><link href="css/smartdt-shell-patch.css" rel="stylesheet"/></head>
<body data-page="registration"><div class="app">
<header class="header"><a class="brand" href="welcome.html"><span aria-hidden="true" class="brand-logo brand-logo-inline"><img alt="Smart DT logo" decoding="async" loading="lazy" src="https://iili.io/Cd3i8QV.png"/></span><span class="brand-text">Smart DT<br/>Project</span></a><div class="header-actions"><span class="pill lang-pill"><span class="pill-symbol" aria-hidden="true">🌐</span> EN</span><span class="avatar">ST</span><button aria-label="Menu" class="icon-btn menu-lines"><span></span><span></span><span></span></button></div></header>
<main class="page no-nav">
<section class="hero-card auth"><img alt="Registration header" src="https://iili.io/CdztVBS.png"/></section>
<section class="form-card"><h1 class="section-title" style="margin-top:0">Create your student profile</h1><p class="section-sub">This information is saved locally first so the dashboard and phase templates can personalise your Smart DT journey.</p>
<form class="form-grid" id="registrationForm">
<div class="field"><label>Full Name</label><input class="input" name="df_student_name" placeholder="e.g. Nur Aina Binti Ahmad" required=""/></div>
<div class="field"><label>Email Address</label><input class="input" name="df_email" placeholder="e.g. yourname@gmail.com" required="" type="email"/></div>
<div class="mini-row"><div class="field"><label>Registration No.</label><input class="input" name="df_reg_no" placeholder="e.g. 01DTK23F1001" required=""/></div><div class="field"><label>Class</label><input class="input" name="df_class" placeholder="e.g. DTK5A" required=""/></div></div>
<div class="field"><label>Project Title</label><input class="input" name="df_project_name" placeholder="e.g. Smart Queue System"/></div>
<div class="mini-row"><div class="field"><label>Team Name</label><input class="input" name="df_team" placeholder="e.g. Team Innovate"/></div><div class="field"><label>Project Guide Name</label><input class="input" name="df_supervisor" placeholder="e.g. Ts. Dr. ..."/></div></div>
<button class="btn primary full" type="submit">Save &amp; Continue</button>
</form>
</section>
<p class="footer-note">Your data is stored in your browser for the current prototype version.</p>
</main></div><script src="js/smartdt-assets.js"></script><script src="js/smartdt.js"></script></body></html>
